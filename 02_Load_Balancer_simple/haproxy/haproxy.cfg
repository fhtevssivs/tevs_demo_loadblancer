global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend https-in
    bind *:443 ssl crt /usr/local/etc/haproxy/certs/loadbalancer.pem
    default_backend servers

backend servers
    balance roundrobin
    option httpchk GET /
    server webserver1 webserver1:8001 check ssl verify none
    server webserver2 webserver2:8002 check ssl verify none
