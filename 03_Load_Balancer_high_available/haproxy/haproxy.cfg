global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend https-in
    bind *:8000 ssl crt /usr/local/etc/haproxy/certs/loadbalancer.pem
    default_backend servers

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats admin if TRUE
    stats auth admin:admin  # Default credentials for the demo

backend servers
    balance roundrobin
    option httpchk

    # 1. Define the connection parameters
    http-check connect ssl alpn h2,http/1.1

    # 2. Explicitly send the HTTP request
    http-check send meth GET uri /

    # 3. Define what success looks like
    http-check expect status 200

    server webserver1 webserver1:8001 check ssl verify none
    server webserver2 webserver2:8002 check ssl verify none

